name: EAS Build (Android APK)

on:
  push:
    branches:
      - main    # triggers a new APK build on every push to main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node.js 20
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Set up Expo + EAS CLI
      #    Requires secret: EXPO_TOKEN
      #    Get it from: expo.dev → Account Settings → Access Tokens → Create token
      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # 5. Build the Android APK (preview profile = internal APK, no signing needed)
      - name: Build Android APK
        run: eas build --platform android --profile preview --non-interactive
